// -----------------------------------------------------------------------------
// 0. EVENT DELEGATION GLOBAL
// -----------------------------------------------------------------------------
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action;
  try {
    switch (action) {
      // --- Gestión de usuarios ---
      case "add-user":
        window._openAddUsuarioDialog && window._openAddUsuarioDialog();
        break;
      case "close-add-user-dialog":
        window._closeAddUsuarioDialog && window._closeAddUsuarioDialog();
        break;
      case "close-edit-user-dialog":
        window._closeEditUserDialog && window._closeEditUserDialog();
        break;
      case "save-edit-user":
        window._saveEditUser && window._saveEditUser();
        break;
      case "save-new-usuario":
        window._saveNewUsuario && window._saveNewUsuario();
        break;
      case "gen-temp-pass":
        window._genTempPass && window._genTempPass();
        break;
      case "refresh-usuarios":
        window._refreshUsuarios && window._refreshUsuarios();
        break;
      case "repair-user":
        window._repairUser && window._repairUser();
        break;
      case "toggle-role":
        window._toggleUserRole && window._toggleUserRole(btn.dataset.uid, btn.dataset.role);
        break;
      case "edit-user":
        window._openEditUserDialog && window._openEditUserDialog(btn.dataset.uid, btn.dataset.nombre, btn.dataset.email, btn.dataset.departamento, btn.dataset.role);
        break;
      case "delete-user":
        window._openDeleteUsuarioDialog && window._openDeleteUsuarioDialog(btn.dataset.uid, btn.dataset.nombre, btn.dataset.email);
        break;
      case "close-delete-user-dialog":
        window._closeDeleteUsuarioDialog && window._closeDeleteUsuarioDialog();
        break;
      case "confirm-delete-usuario":
        window._confirmDeleteUsuario && window._confirmDeleteUsuario(btn.dataset.uid, btn.dataset.nombre);
        break;
      case "copy-firestore-rules":
        window._copyFirestoreRules && window._copyFirestoreRules(btn);
        break;
      // --- Cursos ---
      case "set-curso-activo":
        window._setCursoActivo && window._setCursoActivo(btn.dataset.curso);
        break;
      case "set-curso-activo-from-select": {
        const select = document.getElementById("select-curso-activo");
        const cursoId = select ? select.value : "";
        if (cursoId) window._setCursoActivo && window._setCursoActivo(cursoId);
        break;
      }
      case "import-profesores":
        window._importProfesores && window._importProfesores(btn.dataset.destino, btn.dataset.origen);
        break;
      case "create-curso":
        window._createCurso && window._createCurso();
        break;
      case "delete-curso":
        window._deleteCurso && window._deleteCurso(btn.dataset.cursoId);
        break;
      // --- Perfil e informes ---
      case "save-perfil":
        window._savePerfil && window._savePerfil();
        break;
      case "set-period":
        window._setPeriod && window._setPeriod(btn.dataset.period);
        break;
      case "generate-informe":
        window._generateInforme && window._generateInforme();
        break;
      case "show-informe-modal":
        window._showInformeModal && window._showInformeModal();
        break;
      case "close-informe-modal":
        window._closeInformeModal && window._closeInformeModal();
        break;
      // --- Ayuda y evaluaciones ---
      case "toggle-help":
        window._toggleHelp && window._toggleHelp(btn.dataset.key);
        break;
      case "toggle-eval":
        window._toggleEval && window._toggleEval(parseInt(btn.dataset.idx));
        break;
      case "toggle-reports":
        window._toggleReports && window._toggleReports();
        break;
      case "set-filter":
        window._setFilter && window._setFilter(btn.dataset.filterType, btn.dataset.filterValue);
        break;
      // --- Evidencias Lector ---
      case "open-group-menu":
        window._openGroupMenu && window._openGroupMenu(btn.dataset.fecha, parseInt(btn.dataset.hora), parseInt(btn.dataset.semana), btn.dataset.dia);
        break;
      case "close-group-menu":
        window._closeGroupMenu && window._closeGroupMenu();
        break;
      case "select-group-lector":
        window._selectGroupLector && window._selectGroupLector(btn.dataset.grupo);
        break;
      case "edit-ev-lector":
        if (btn.dataset.stopPropagation) e.stopPropagation();
        window._editEvidenciaLector && window._editEvidenciaLector(btn.dataset.id);
        break;
      case "view-ev-lector":
        if (btn.dataset.stopPropagation) e.stopPropagation();
        window._viewEvidenciaLector && window._viewEvidenciaLector(btn.dataset.id);
        break;
      case "close-ev-lector":
        window._closeEvLectorDialog && window._closeEvLectorDialog();
        break;
      case "save-ev-lector":
        window._saveEvLector && window._saveEvLector();
        break;
      case "delete-ev-lector":
        window._deleteEvLector && window._deleteEvLector();
        break;
      // --- Evidencias RM ---
      case "open-ev-rm":
        window._openEvRMDialog && window._openEvRMDialog(btn.dataset.mode, btn.dataset.grupo, parseInt(btn.dataset.semana), parseInt(btn.dataset.sesion), btn.dataset.materia, btn.dataset.actividad, btn.dataset.codigo);
        break;
      case "edit-ev-rm":
        window._editEvidenciaRM && window._editEvidenciaRM(btn.dataset.id, btn.dataset.sesion, btn.dataset.materia, btn.dataset.actividad, btn.dataset.codigo);
        break;
      case "view-ev-rm":
        window._viewEvidenciaRM && window._viewEvidenciaRM(btn.dataset.id, btn.dataset.sesion, btn.dataset.materia, btn.dataset.actividad, btn.dataset.codigo);
        break;
      case "close-ev-rm":
        window._closeEvRMDialog && window._closeEvRMDialog();
        break;
      case "save-ev-rm":
        window._saveEvRM && window._saveEvRM();
        break;
      case "delete-ev-rm":
        window._deleteEvRM && window._deleteEvRM();
        break;
      // --- Informes PDF (vista RM) ---
      case "generate-subject-pdf":
        window._generateSubjectPDF && window._generateSubjectPDF(btn.dataset.cursoId, btn.dataset.cursoNombre);
        break;
      case "generate-trimestre-pdf":
        window._generateTrimestrePDF && window._generateTrimestrePDF(btn.dataset.cursoId, btn.dataset.cursoNombre);
        break;
      default:
        console.warn("[click] Acción no reconocida:", action);
    }
  } catch (err) {
    console.error("[click] Error en acción '" + action + "':", err);
    alert("Error al ejecutar '" + action + "': " + (err.message || err));
  }
});

// Handler global de errores
window.addEventListener("error", (e) => {
  console.error("[ERROR GLOBAL]", e.error || e.message, e.filename + ":" + e.lineno);
});
window.addEventListener("unhandledrejection", (e) => {
  console.error("[PROMESA RECHAZADA]", e.reason);
});

// Helper: escapar HTML para prevenir XSS en datos introducidos por usuarios
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// Función: obtener una actividad de Lengua específica del curso, seleccionada aleatoriamente
function getActividadLenguaRM(cursoId, weekNum) {
  const actividades = ACTIVIDADES_LENGUA_RM[cursoId];
  if (!actividades || actividades.length === 0) return null;
  // Usar weekNum como semilla para que cada semana tenga una actividad distinta pero determinista
  const idx = (weekNum - 1) % actividades.length;
  return actividades[idx];
}

function normalizeDate(s) {
  if (!s || typeof s !== "string") return new Date(NaN);
  const parts = s.split("-");
  if (parts.length < 3) return new Date(NaN);
  const [y, m, d] = parts.map(Number);
  return new Date(y, m - 1, d);
}

// --- Utilidades de cursos escolares ---
// Un curso escolar empieza el 1 de septiembre de un año y termina el 31 de agosto del año siguiente.
// Ejemplo: el curso "2025-2026" va del 2025-09-01 al 2026-08-31.
function computeSchoolYearLabel(date) {
  const d = date instanceof Date ? date : new Date();
  const y = d.getFullYear();
  const m = d.getMonth(); // 0 = enero, 8 = septiembre
  // Si estamos entre enero y agosto, pertenecemos al curso que empezó el septiembre anterior
  if (m < 8) return `${y - 1}-${y}`;
  return `${y}-${y + 1}`;
}

function getSchoolYearBounds(label) {
  const [startYear] = label.split("-").map(Number);
  return {
    start: `${startYear}-09-01`,
    end: `${startYear + 1}-08-31`,
  };
}

// El plan empieza el primer lunes de septiembre del curso (o el 15 de sept para 2025-2026 histórico)
function computePlanStartForYear(label) {
  const { start } = getSchoolYearBounds(label);
  const d = normalizeDate(start);
  const dow = d.getDay(); // 0=dom, 1=lun
  let diff = (1 - dow + 7) % 7;
  d.setDate(d.getDate() + diff);
  return dateToISO(d);
}

// Curso escolar por defecto (2025-2026) con el calendario histórico del centro
const DEFAULT_CURSOS = [
  {
    id: "2025-2026",
    label: "2025-2026",
    start: "2025-09-01",
    end: "2026-08-31",
    planStart: "2025-09-15",
    planEnd: "2026-06-19",
    evaluaciones: [
      { name: "Primera Evaluación", start: "2025-09-15", end: "2025-12-19", weeks: 14 },
      { name: "Segunda Evaluación", start: "2026-01-12", end: "2026-03-27", weeks: 11 },
      { name: "Tercera Evaluación", start: "2026-04-06", end: "2026-06-19", weeks: 11 },
    ],
    createdAt: Date.now(),
  },
];

function getCurrentCurso() {
  // 1) Si el admin ha forzado un curso, usarlo
  if (state.forcedCursoId) {
    let curso = (state.cursos).find(c => c.id === state.forcedCursoId);
    if (curso) return curso;
  }
  // 2) Auto-detección por fecha
  const label = computeSchoolYearLabel(new Date());
  // Buscar en state.cursos
  if (state.cursos && state.cursos.length > 0) {
    let curso = state.cursos.find(c => c.id === label || c.label === label);
    if (curso) return curso;
    // Si no existe el curso actual en Firestore, usar DEFAULT_CURSOS si existe
    const defaultCurso = DEFAULT_CURSOS.find(c => c.id === label);
    if (defaultCurso) return defaultCurso;
    // Si no, usar el más reciente de Firestore
    return state.cursos.slice().sort((a, b) => (b.id || "").localeCompare(a.id || ""))[0];
  }
  // Si no hay cursos en Firestore, usar DEFAULT_CURSOS
  return DEFAULT_CURSOS.find(c => c.id === label) || DEFAULT_CURSOS[0];
}

function getEvaluacionesForCurso(curso) {
  if (curso?.evaluaciones?.length) return curso.evaluaciones;
  return EVALUATIONS;
}

function getPlanStartForCurso(curso) {
  return curso?.planStart || PLAN_START;
}

function getPlanEndForCurso(curso) {
  return curso?.planEnd || PLAN_END;
}
function dateToISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function formatDateES(d) {
  if (!d || isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("es-ES", { day: "2-digit", month: "2-digit", year: "numeric" });
}
function getWeekDates(weekNumber) {
  const curso = getCurrentCurso();
  const planStart = getPlanStartForCurso(curso);
  const start = normalizeDate(planStart);
  start.setDate(start.getDate() + (weekNumber - 1) * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 4);
  return { start, end };
}
function getEvaluationForWeek(weekNumber) {
  const curso = getCurrentCurso();
  const evals = getEvaluacionesForCurso(curso);
  let cumul = 0;
  for (let i = 0; i < evals.length; i++) {
    if (weekNumber <= cumul + evals[i].weeks) return i;
    cumul += evals[i].weeks;
  }
  return evals.length - 1;
}
function getReadingHour(weekNumber) {
  return ((weekNumber - 1) % 6) + 1;
}
function getDaysOfWeek(weekStart) {
  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  return days;
}

// Cualquier usuario cuyo correo esté en esa lista es admin en la UI, independientemente de lo que
// diga Firestore (que puede estar desactualizado o ser ilegible por las reglas de seguridad).
// El campo `role` en Firestore se usa solo para usuarios NO bootstrap (promovidos manualmente).
function isBootstrapAdminEmail(email) {
  if (!email) return false;
  const e = email.toLowerCase();
  return ADMIN_BOOTSTRAP_EMAILS.some(a => a.toLowerCase() === e);
}
function isAdmin() {
  // 1) Bootstrap por correo (prioridad máxima)
  if (isBootstrapAdminEmail(state.user?.email)) return true;
  // 2) Rol almacenado en Firestore
  return state.userProfile?.role === "admin";
}
function isProfesor() { return !isAdmin(); }

// Fusiona los cursos de Firestore con DEFAULT_CURSOS, sin duplicados.
// Así, el curso 2025-2026 (que está en DEFAULT_CURSOS) siempre aparece,
// aunque no exista en Firestore.
function mergeCursos(firestoreItems) {
  if (!firestoreItems || firestoreItems.length === 0) {
    return DEFAULT_CURSOS.map(c => ({ ...c }));
  }
  const existingIds = new Set(firestoreItems.map(c => c.id));
  const defaults = DEFAULT_CURSOS.filter(c => !existingIds.has(c.id));
  return [...firestoreItems, ...defaults];
}

// --- CRUD Usuarios ---
// Lee el perfil de un usuario por su uid. Si no existe, lo crea con valores por defecto.
// Si ya existe pero el correo es uno de los ADMIN_BOOTSTRAP_EMAILS y el rol almacenado
// no es 'admin', lo promociona automáticamente (auto-corrección al iniciar sesión).
// NOTA: si la escritura falla por permisos de Firestore, no se lanza error; el usuario
// seguirá viéndose como admin en la UI porque isAdmin() comprueba el correo directamente.
async function ensureUserProfile(user, extra = {}) {
  if (!user) return null;
  const ref = doc(db, USUARIOS_COLLECTION, user.uid);
  const email = user.email || "";
  const isBootstrapAdmin = isBootstrapAdminEmail(email);

  let snap;
  try {
    snap = await getDoc(ref);
  } catch (e) {
    console.warn("[ensureUserProfile] No se pudo leer el perfil de Firestore:", e.code || e.message);
    // Devolver un perfil sintético basado en Auth + email
    return {
      id: user.uid,
      uid: user.uid,
      email,
      displayName: user.displayName || email.split("@")[0] || "Profesor/a",
      role: isBootstrapAdmin ? "admin" : "profesor",
      department: extra.department || "",
      _synthetic: true,
    };
  }

  if (snap.exists()) {
    const data = snap.data();
    // Auto-promoción: si el correo está en la lista de admins pero el perfil dice 'profesor', corregir.
    if (isBootstrapAdmin && data.role !== "admin") {
      try {
        const merged = { ...data, role: "admin", updatedAt: Date.now() };
        await setDoc(ref, merged, { merge: true });
        console.info(`[ensureUserProfile] Auto-promocionado a admin: ${email}`);
        return { id: snap.id, ...merged };
      } catch (e) {
        console.warn("[ensureUserProfile] No se pudo persistir el rol admin (reglas de Firestore). " +
                     "El usuario seguirá viéndose como admin en la UI por su correo:", e.code || e.message);
        // Devolver el perfil con el rol corregido en memoria
        return { id: snap.id, ...data, role: "admin" };
      }
    }
    return { id: snap.id, ...data };
  }

  // Crear perfil por defecto
  const profile = {
    uid: user.uid,
    email,
    displayName: user.displayName || email.split("@")[0] || "Profesor/a",
    role: isBootstrapAdmin ? "admin" : "profesor",
    department: extra.department || "",
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
  try {
    await setDoc(ref, profile);
  } catch (e) {
    console.warn("[ensureUserProfile] No se pudo crear el perfil en Firestore:", e.code || e.message);
    profile._synthetic = true;
  }
  return { id: user.uid, ...profile };
}

async function updateUserProfile(uid, data) {
  const ref = doc(db, USUARIOS_COLLECTION, uid);
  const snap = await getDoc(ref);
  const existing = snap.exists() ? snap.data() : {};
  const merged = { ...existing, ...data, uid, updatedAt: Date.now() };
  await setDoc(ref, merged, { merge: true });
  return { id: uid, ...merged };
}

// Crear un nuevo usuario desde el panel de administración.
// Usa la instancia secundaria de Firebase Auth para NO cerrar la sesión del admin.
// Tras crear la cuenta en Auth, crea el perfil en Firestore con los datos indicados.
async function createUsuarioByAdmin({ nombre, email, departamento, rol, password }) {
  if (!nombre || !email || !password) throw new Error("Faltan datos obligatorios.");

  let newUid;
  let authCreated = false;

  // 1) Crear cuenta en Firebase Auth con la instancia secundaria
  try {
    const cred = await createUserWithEmailAndPassword(secondaryAuth, email, password);
    newUid = cred.user.uid;
    authCreated = true;
    // Actualizar el displayName en Auth
    try { await updateProfile(cred.user, { displayName: nombre }); } catch (e) { console.warn("No se pudo actualizar displayName:", e); }
    // Cerrar la sesión de la instancia secundaria (no afecta a la principal)
    try { await secondaryAuth.signOut(); } catch (e) { console.warn("No se pudo cerrar sesión secundaria:", e); }
  } catch (e) {
    if (e.code === "auth/email-already-in-use") {
      // El email ya existe en Auth. Preguntar si quiere reparar el perfil en Firestore.
      const uid = prompt(
        "Ya existe una cuenta con ese correo en Firebase Authentication, pero su perfil no está en Firestore.\n\n" +
        "Para repararlo, necesito el UID del usuario.\n\n" +
        "Puedes obtenerlo en Firebase Console → Authentication → Users (columna User UID).\n\n" +
        "Pega el UID aquí:"
      );
      if (uid && uid.trim()) {
        try {
          const profile = {
            uid: uid.trim(),
            email,
            displayName: nombre,
            role: rol || "profesor",
            department: departamento || "",
            createdAt: Date.now(),
            updatedAt: Date.now(),
            createdBy: state.user?.uid || null,
          };
          const ref = doc(db, USUARIOS_COLLECTION, uid.trim());
          await setDoc(ref, profile, { merge: true });
          return { id: uid.trim(), ...profile };
        } catch (repairErr) {
          throw new Error("No se pudo reparar el perfil en Firestore: " + (repairErr.code || repairErr.message) +
            ". Verifica las reglas de Firestore (panel amarillo en Usuarios).");
        }
      }
      throw new Error("Operación cancelada. El usuario existe en Auth pero no tiene perfil en Firestore.");
    }
    throw e;
  }

  // 2) Crear el perfil en Firestore usando el uid del nuevo usuario
  const profile = {
    uid: newUid,
    email,
    displayName: nombre,
    role: rol || "profesor",
    department: departamento || "",
    createdAt: Date.now(),
    updatedAt: Date.now(),
    createdBy: state.user?.uid || null,
  };
  try {
    const ref = doc(db, USUARIOS_COLLECTION, newUid);
    await setDoc(ref, profile);
  } catch (e) {
    console.error("[createUsuarioByAdmin] Error al crear perfil en Firestore:", e.code || e.message);
    // Lanzar error para que el admin sepa que falló
    throw new Error("Se creó la cuenta en Authentication pero NO se pudo crear el perfil en Firestore. " +
      "Error: " + (e.code || e.message) + ". " +
      "Verifica que las reglas de Firestore permiten al admin crear documentos en 'usuarios'. " +
      "Copia las reglas desde el panel amarillo de la sección Usuarios.");
  }
  return { id: newUid, ...profile };
}

// Eliminar un usuario y TODA la información que ha generado (borrado en cascada).
// NOTA: No se puede eliminar la cuenta de Firebase Auth desde el cliente (requiere Admin SDK).
// Por tanto, esta función:
//   1) Borra todas las evidencias_lector donde createdBy == uid
//   2) Borra todas las evidencias_rm donde createdBy == uid
//   3) Borra el documento usuarios/{uid}
//   4) Devuelve un informe de lo que se ha borrado
// La cuenta de Auth seguirá existiendo; el admin deberá eliminarla manualmente desde
// Firebase Console si quiere un borrado completo.
async function deleteUsuarioCascade(uid) {
  const report = { uid, evidenciasLector: 0, evidenciasRM: 0, perfil: false, errors: [] };

  // 1) Borrar evidencias Lector
  try {
    const qLector = query(collection(db, LECTOR_COLLECTION), where("createdBy", "==", uid));
    const snapLector = await getDocs(qLector);
    const batchLector = [];
    snapLector.forEach((d) => {
      batchLector.push(deleteDoc(doc(db, LECTOR_COLLECTION, d.id)));
    });
    await Promise.all(batchLector);
    report.evidenciasLector = batchLector.length;
  } catch (e) {
    console.error("Error borrando evidencias Lector:", e);
    report.errors.push(`Lector: ${e.code || e.message}`);
  }

  // 2) Borrar evidencias RM
  try {
    const qRM = query(collection(db, RM_COLLECTION), where("createdBy", "==", uid));
    const snapRM = await getDocs(qRM);
    const batchRM = [];
    snapRM.forEach((d) => {
      batchRM.push(deleteDoc(doc(db, RM_COLLECTION, d.id)));
    });
    await Promise.all(batchRM);
    report.evidenciasRM = batchRM.length;
  } catch (e) {
    console.error("Error borrando evidencias RM:", e);
    report.errors.push(`RM: ${e.code || e.message}`);
  }

  // 3) Borrar el perfil del usuario
  try {
    await deleteDoc(doc(db, USUARIOS_COLLECTION, uid));
    report.perfil = true;
  } catch (e) {
    console.error("Error borrando perfil:", e);
    report.errors.push(`Perfil: ${e.code || e.message}`);
  }

  return report;
}

// Lectura puntual (one-shot) de la colección usuarios. Útil para forzar refresco
// cuando la suscripción en tiempo real no dispara el callback (pestaña en segundo
// plano, conexión intermitente, etc.).
async function refreshUsuariosNow() {
  if (state.usuariosRefreshing) {
    return;
  }
  state.usuariosRefreshing = true;
  // Forzar re-render para mostrar el spinner
  if (state.user && state.view.name === "gestion-usuarios") safeRenderMain("usuarios-refresh-start");
  try {
    const q = query(collection(db, USUARIOS_COLLECTION), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const items = [];
    snap.forEach((d) => items.push({ id: d.id, ...d.data() }));
    state.usuarios = items;
    state.usuariosError = null;
    state.usuariosLastUpdated = Date.now();
    // Forzar re-render SIEMPRE después de actualizar (no usar safeRenderMain que puede saltarse)
    if (state.user && state.view.name === "gestion-usuarios" && !isDialogOpen()) {
      renderMain();
    }
  } catch (err) {
    console.error("[refreshUsuariosNow] Error:", err.code || err.message);
    state.usuariosError = err;
  } finally {
    state.usuariosRefreshing = false;
    if (state.user && state.view.name === "gestion-usuarios" && !isDialogOpen()) {
      renderMain();
    }
  }
}

      snap.forEach((d) => items.push({ id: d.id, ...d.data() }));
      state.evidenciasLector = items;
    }
    if (which === "all" || which === "rm") {
      const q = query(collection(db, RM_COLLECTION), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      const items = [];
      snap.forEach((d) => items.push({ id: d.id, ...d.data() }));
      state.evidenciasRM = items;
    }
    safeRenderMain("evidencias-refresh");
  } catch (err) {
    console.error("refreshEvidenciasNow:", err);
  }
}

// =============================================================================
// SINCRONIZACIÓN GLOBAL EN TIEMPO REAL
// =============================================================================
// Esta función configura TODAS las suscripciones en tiempo real y las redes de
// seguridad (polling periódico + refresco al volver a la pestaña).
// Se llama una vez al iniciar la app y se re-configura cuando el usuario inicia sesión.
function setupGlobalSync() {
  // Limpiar suscripciones y timers previos
  Object.values(subs).forEach(s => { try { s && s(); } catch (e) {} });
  Object.values(timers).forEach(t => { if (t) clearInterval(t); });
  subs.lector = subs.rm = subs.usuarios = subs.cursos = subs.ownProfile = subs.cursoProfesores = null;
  timers.usuarios = timers.lector = timers.rm = timers.cursos = null;

  // 1) Suscripción en tiempo real a evidencias Lector
  subs.lector = subscribeAllLector((items) => {
    state.evidenciasLector = items || [];
    // Re-renderizar en cualquier vista que muestre datos de Lector
    if (state.user && ["cronograma-lector", "informes", "plan-lector"].includes(state.view.name)) {
      safeRenderMain("lector-snapshot");
    }
  });

  // 2) Suscripción en tiempo real a evidencias RM
  subs.rm = subscribeAllRM((items) => {
    state.evidenciasRM = items || [];
    if (state.user && ["curso-rm", "informes", "razonamiento-matematico"].includes(state.view.name)) {
      safeRenderMain("rm-snapshot");
    }
  });

  // 3) Suscripción en tiempo real a usuarios
  subs.usuarios = subscribeAllUsuarios((items, err) => {
    state.usuarios = items || [];
    state.usuariosError = err || null;
    if (!err) state.usuariosLastUpdated = Date.now();
    if (state.user && ["gestion-usuarios", "informes"].includes(state.view.name)) {
      safeRenderMain("usuarios-snapshot");
    }
  });

  // 4) Suscripción en tiempo real a cursos escolares
  subs.cursos = subscribeAllCursos((items) => {
    state.cursos = mergeCursos(items);
    if (state.user && ["cursos-escolares", "informes", "cronograma-lector", "curso-rm"].includes(state.view.name)) {
      safeRenderMain("cursos-snapshot");
    }
  });

  // 4b) Suscripción en tiempo real a curso_profesores (asignación de profesores por curso)
  try {
    const qProf = collection(db, "curso_profesores");
    subs.cursoProfesores = onSnapshot(qProf, (snap) => {
      const map = {};
      snap.forEach((d) => {
        const data = d.data();
        if (data.cursoId) map[data.cursoId] = data.profesores || [];
      });
      state.profesoresPorCurso = map;
      if (state.user && state.view.name === "cursos-escolares") safeRenderMain("curso-profesores-snapshot");
    }, (err) => {
      console.warn("subscribeCursoProfesores:", err.code || err.message);
    });
  } catch (e) {
    console.warn("No se pudo suscribir a curso_profesores:", e);
  }

  // 5) Suscripción al propio perfil (si hay usuario logueado)
  if (state.user) {
    subs.ownProfile = subscribeOwnProfile(state.user.uid, (profile, err) => {
      if (profile) {
        state.userProfile = profile;
        safeRenderMain("own-profile-snapshot");
      }
    });
  }

  // 6) Polling periódico como red de seguridad
  // Usuarios: cada 30 segundos (por si la suscripción en tiempo real falla silenciosamente)
  timers.usuarios = setInterval(() => {
    if (state.user && isAdmin()) {
      refreshUsuariosNow();
    }
  }, 30000);

  // Evidencias: cada 60 segundos
  timers.lector = setInterval(() => {
    if (state.user) refreshEvidenciasNow("lector");
  }, 60000);
  timers.rm = setInterval(() => {
    if (state.user) refreshEvidenciasNow("rm");
  }, 60000);

  // 7) Refresco al volver a la pestaña (visibility change)
  // El onSnapshot puede morir silenciosamente tras un error de permisos; al volver
  // a la pestaña forzamos una lectura puntual para garantizar datos frescos.
  document.addEventListener("visibilitychange", handleVisibilityChange);
}

// Handler de visibility change (definido fuera para poder quitarlo si hace falta)
function handleVisibilityChange() {
  if (document.visibilityState === "visible" && state.user) {
    // La pestaña acaba de volver a estar visible: refrescar todo
    refreshEvidenciasNow("all");
    if (isAdmin()) refreshUsuariosNow();
    // Re-suscribir por si las suscripciones anteriores murieron
    // (lo hacemos solo si hace más de 5 min que no se re-configura, para no abusar)
    if (!subs._lastResubscribe || Date.now() - subs._lastResubscribe > 5 * 60 * 1000) {
      // Re-crear las suscripciones en tiempo real (no las propias, que se re-crean en setupGlobalSync)
      try { subs.lector && subs.lector(); } catch (e) {}
      try { subs.rm && subs.rm(); } catch (e) {}
      try { subs.usuarios && subs.usuarios(); } catch (e) {}
      try { subs.cursos && subs.cursos(); } catch (e) {}
      subs.lector = subscribeAllLector((items) => {
        state.evidenciasLector = items || [];
        if (state.user && ["cronograma-lector", "informes", "plan-lector"].includes(state.view.name)) safeRenderMain("lector-resubscribe");
      });
      subs.rm = subscribeAllRM((items) => {
        state.evidenciasRM = items || [];
        if (state.user && ["curso-rm", "informes", "razonamiento-matematico"].includes(state.view.name)) safeRenderMain("rm-resubscribe");
      });
      subs.usuarios = subscribeAllUsuarios((items, err) => {
        state.usuarios = items || [];
        state.usuariosError = err || null;
        if (!err) state.usuariosLastUpdated = Date.now();
        if (state.user && ["gestion-usuarios", "informes"].includes(state.view.name)) safeRenderMain("usuarios-resubscribe");
      });
      subs.cursos = subscribeAllCursos((items) => {
        state.cursos = mergeCursos(items);
        if (state.user && ["cursos-escolares", "informes", "cronograma-lector", "curso-rm"].includes(state.view.name)) safeRenderMain("cursos-resubscribe");
      });
      subs._lastResubscribe = Date.now();
    }
  }
}

// --- CRUD Cursos Escolares ---
function subscribeAllCursos(cb) {
  const q = query(collection(db, CURSOS_COLLECTION), orderBy("id", "desc"));
  return onSnapshot(q, (snap) => {
    const items = [];
    snap.forEach((d) => items.push({ id: d.id, ...d.data() }));
    cb(items);
  }, (err) => {
    console.error("subscribeCursos:", err);
    // Si Firestore falla o está vacío, usar el curso por defecto
    cb(DEFAULT_CURSOS.map(c => ({ ...c })));
  });
}

async function createCurso(data) {
  const ref = doc(db, CURSOS_COLLECTION, data.id);
  const payload = { ...data, createdAt: Date.now(), updatedAt: Date.now() };
  await setDoc(ref, payload, { merge: true });
  return { id: data.id, ...payload };
}

async function deleteCurso(id) {
  return deleteDoc(doc(db, CURSOS_COLLECTION, id));
}

// Genera las evaluaciones por defecto para un curso nuevo (14/11/11 semanas a partir del planStart)
function generateEvaluacionesForCurso(curso) {
  const planStart = curso.planStart;
  const start = normalizeDate(planStart);
  const ev1End = new Date(start); ev1End.setDate(ev1End.getDate() + 14 * 7 - 1);
  const ev2Start = new Date(ev1End); ev2Start.setDate(ev2Start.getDate() + 3); // pequeño hueco
  const ev2End = new Date(ev2Start); ev2End.setDate(ev2End.getDate() + 11 * 7 - 1);
  const ev3Start = new Date(ev2End); ev3Start.setDate(ev3Start.getDate() + 3);
  const ev3End = new Date(ev3Start); ev3End.setDate(ev3End.getDate() + 11 * 7 - 1);
  return [
    { name: "Primera Evaluación", start: dateToISO(start), end: dateToISO(ev1End), weeks: 14 },
    { name: "Segunda Evaluación", start: dateToISO(ev2Start), end: dateToISO(ev2End), weeks: 11 },
    { name: "Tercera Evaluación", start: dateToISO(ev3Start), end: dateToISO(ev3End), weeks: 11 },
  ];
}

function viewCronogramaLector() {
  // Usar evaluaciones del curso actual
  const curso = getCurrentCurso();
  const EVALS = getEvaluacionesForCurso(curso);
  // Build schedule by evaluation
  let cumul = 0;
  const schedule = EVALS.map((ev, idx) => {
    const weeks = [];
    for (let i = 1; i <= ev.weeks; i++) {
      const wnum = cumul + i;
      const { start } = getWeekDates(wnum);
      weeks.push({
        num: wnum,
        start,
        hour: getReadingHour(wnum),
        days: getDaysOfWeek(start).map((date, di) => ({
          date,
          name: DIA_SEMANA[di],
          isoDate: dateToISO(date),
        })),
      });
    }
    cumul += ev.weeks;
    return { evalIdx: idx, eval: ev, weeks };
  });

  return `
    <div class="space-y-4">
      <div class="overflow-hidden rounded-2xl bg-gradient-to-br from-blue-600 to-cyan-600 text-white shadow-lg p-4 sm:p-6">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h1 class="text-lg sm:text-2xl font-bold">Cronograma Plan Lector (2025-2026)</h1>
            <p class="text-sm text-white/85 mt-1">Sesiones de lectura de 30 minutos, rotando entre 1ª y 6ª hora.</p>
          </div>
          <button data-action="toggle-help" data-key="cronograma-lector" class="bg-white/15 hover:bg-white/25 text-white border border-white/20 rounded-lg px-3 py-1.5 text-sm font-medium shrink-0 flex items-center gap-1.5">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Ayuda
          </button>
        </div>
        ${state.showHelp["cronograma-lector"] ? `
          <div class="mt-4 text-left bg-yellow-50 text-slate-800 rounded-lg p-4 text-sm space-y-2">
            <p class="font-bold">Cómo usar el cronograma</p>
            <ul class="list-disc pl-5 space-y-1 text-xs sm:text-sm">
              <li>Tres evaluaciones (14, 11 y 11 semanas). Total: 36 semanas.</li>
              <li>La 1ª columna indica la <strong>hora de lectura</strong> de esa semana (rotación cada 6 semanas).</li>
              <li>Pulsa sobre una celda del día y elige tu <strong>grupo</strong> en el menú.</li>
              <li>La celda se pondrá <span class="text-emerald-600 font-semibold">verde</span> y aparecerá el botón "Registrar evidencia".</li>
              <li>Rellena: nombre, tipología textual y tipo de texto (opcional: observación).</li>
              <li>Las evidencias se guardan en Firebase y pueden editarse o eliminarse en cualquier momento.</li>
            </ul>
          </div>
        ` : ""}
      </div>

      <div class="flex flex-wrap items-center gap-3 text-xs text-slate-600">
        <span class="font-semibold">Leyenda:</span>
        <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded cell-has-evidence" style="border:1px solid #34d399"></span>Con evidencia registrada</span>
        <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded cell-no-evidence" style="border:1px solid #e2e8f0"></span>Sin registrar</span>
        <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded bg-blue-100 border border-blue-300"></span>Hora de lectura</span>
      </div>

      <div class="space-y-3">
        ${schedule.map((s, idx) => `
          <details ${state.openEvals.has(idx) ? "open" : ""} class="border rounded-xl overflow-hidden border-slate-200 bg-white shadow-sm" id="eval-acc-${idx}">
            <summary class="px-4 py-3 hover:bg-slate-50 bg-gradient-to-r from-blue-50 to-cyan-50 flex items-center justify-between" data-action="toggle-eval" data-idx="${idx}">
              <div class="flex items-center gap-2 text-left">
                <svg class="w-4 h-4 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="font-bold text-slate-800 text-sm sm:text-base">${s.eval.name}</span>
                <span class="text-xs text-slate-500 hidden sm:inline">(${s.eval.weeks} semanas · ${formatDateES(new Date(s.eval.start))} → ${formatDateES(new Date(s.eval.end))})</span>
              </div>
              <svg class="w-4 h-4 text-slate-400 acc-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>

      </div>
    </div>`;
}

function renderWeekLector(w) {
  // Buscar evidencias para cada día de esta semana
  const daysHtml = w.days.map(d => {
    const dayEvs = state.evidenciasLector.filter(e => e.fecha === d.isoDate);
    const has = dayEvs.length > 0;
    return `
      <button data-action="open-group-menu" data-fecha="${d.isoDate}" data-hora="${w.hour}" data-semana="${w.num}" data-dia="${d.name}"
        class="relative p-1.5 rounded border text-left transition min-h-[60px] sm:min-h-[80px] ${has ? 'cell-has-evidence' : 'cell-no-evidence'}">
        <div class="flex flex-col h-full">
          <span class="text-[10px] font-semibold text-slate-600 uppercase tracking-wide">${d.name.slice(0, 3)}</span>
          <span class="text-[10px] sm:text-xs text-slate-500">${d.date.getDate()}/${d.date.getMonth() + 1}</span>
          ${has ? `
            <div class="mt-auto space-y-0.5">
              ${dayEvs.map(ev => {
                const canEdit = canEditEvidencia(ev);
                // Actividad realizada: tipología + tipo de texto
                let actividadRealizada = "";
                if (ev.tipologia) actividadRealizada += ev.tipologia;
                if (ev.tipoTexto) actividadRealizada += (actividadRealizada ? " · " : "") + ev.tipoTexto;
                return `<span data-action="${canEdit ? 'edit-ev-lector' : 'view-ev-lector'}" data-id="${ev.id}" data-stop-propagation="1"
                  class="block text-[9px] sm:text-[10px] ${canEdit ? 'text-emerald-700 bg-emerald-100 hover:bg-emerald-200 cursor-pointer' : 'text-slate-600 bg-slate-100 cursor-pointer'} rounded px-1 py-0.5"
                  title="${escapeHtml(ev.grupo)} - ${escapeHtml(ev.profesor || 'Sin nombre')}${canEdit ? ' (puedes editar)' : ' (solo lectura)'}">
                  <span class="font-semibold">${canEdit ? '✓' : '🔒'} ${escapeHtml(ev.grupo)}</span>${actividadRealizada ? `<span class="block text-[8px] sm:text-[9px] text-slate-600 truncate mt-0.5">${escapeHtml(actividadRealizada)}</span>` : ''}
                </span>`;
              }).join("")}
            </div>
          ` : `<span class="mt-auto text-[9px] sm:text-[10px] text-slate-400 inline-flex items-center gap-0.5">+ Añadir</span>`}
        </div>
      </button>`;
  }).join("");

  return `
    <div class="rounded-lg border border-slate-200 overflow-hidden bg-white">
      <div class="flex items-center justify-between px-3 py-1.5 bg-slate-50 border-b border-slate-200">
        <span class="text-xs font-bold text-slate-700">Semana ${w.num}</span>
        <span class="text-xs text-slate-500">${formatDateES(w.start)} → ${formatDateES(w.days[4].date)}</span>
      </div>
      <div class="grid grid-cols-[44px_repeat(5,1fr)] sm:grid-cols-[80px_repeat(5,1fr)] gap-0.5 p-1">
        <div class="flex flex-col items-center justify-center bg-blue-100 border border-blue-300 rounded p-1 text-center">
          <svg class="w-3 h-3 text-blue-700 mb-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span class="text-[10px] sm:text-xs font-bold text-blue-700">${w.hour}ª</span>
        </div>
        ${daysHtml}
      </div>
    </div>`;
}

window._toggleEval = (idx) => {
  if (state.openEvals.has(idx)) state.openEvals.delete(idx);

  const ev = state.evidenciasLector.find(e => e.id === id);

  openEvidenciaLectorDialog({

    semana: ev.semana,

    existing: ev,

  const ev = state.evidenciasLector.find(e => e.id === id);

  openEvidenciaLectorDialog({
    mode: "edit",
    grupo: ev.grupo,
    fecha: ev.fecha,
    semana: ev.semana,
    dia: ev.dia,
    hora: ev.hora,
    existing: ev,
  });
};

        <div id="ev-lector-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></div>
      </div>
      <div class="p-5 border-t border-slate-200 flex flex-wrap gap-2">
        ${data.mode === "edit" ? `<button data-action="delete-ev-lector" class="mr-auto px-4 py-2 rounded-lg bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 text-sm font-medium flex items-center gap-1.5"><svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Eliminar</button>` : ""}
        <button data-action="close-ev-lector" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-50 text-sm font-medium">${isView ? "Cerrar" : "Cancelar"}</button>
        ${isView ? "" : `<button data-action="save-ev-lector" class="px-4 py-2 rounded-lg bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white text-sm font-medium" id="ev-lector-save">${data.mode === "edit" ? "Guardar cambios" : "Registrar"}</button>`}
      </div>
    </div>`;
  document.body.appendChild(overlay);

  // Guardar referencia para handlers
  window._currentEvLector = data;

  // Habilitar/deshabilitar tipo de texto según tipología
  const tipologiaSel = document.getElementById("ev-lector-tipologia");
  const tipoTextoSel = document.getElementById("ev-lector-tipo-texto");
  tipologiaSel.onchange = () => {
    const t = tipologiaSel.value;
    tipoTextoSel.innerHTML = `<option value="">${t ? "Selecciona tipo" : "Primero elige tipología"}</option>` +
      (t && TIPOS_TEXTO[t] ? TIPOS_TEXTO[t].map(x => `<option value="${x}">${x}</option>`).join("") : "");
  };
}

window._closeEvLectorDialog = () => {
  document.getElementById("ev-lector-dialog")?.remove();
  window._currentEvLector = null;
};

window._saveEvLector = async () => {
  const data = window._currentEvLector;
  if (!data) return;
  const profesor = document.getElementById("ev-lector-profesor").value.trim();
  const tipologia = document.getElementById("ev-lector-tipologia").value;
  const tipoTexto = document.getElementById("ev-lector-tipo-texto").value;
  const observacion = document.getElementById("ev-lector-obs").value.trim();
  const err = document.getElementById("ev-lector-error");
  err.classList.add("hidden");

  if (!profesor) { err.textContent = "Indica tu nombre."; err.classList.remove("hidden"); return; }
  if (!tipologia) { err.textContent = "Selecciona la tipología textual."; err.classList.remove("hidden"); return; }
  if (!tipoTexto) { err.textContent = "Selecciona el tipo de texto."; err.classList.remove("hidden"); return; }

  const btn = document.getElementById("ev-lector-save");
  btn.disabled = true;
  btn.textContent = "Guardando…";

  try {
    if (data.mode === "edit" && data.existing?.id) {
      await updateEvidenciaLector(data.existing.id, { profesor, tipologia, tipoTexto, observacion });
    } else {
      await addEvidenciaLector({
        plan: "lector", grupo: data.grupo, fecha: data.fecha, semana: data.semana,
        dia: data.dia, hora: data.hora, profesor, tipologia, tipoTexto, observacion,
      });
    }
    window._closeEvLectorDialog();
  } catch (e) {
    console.error(e);
    err.textContent = "Error al guardar. Inténtalo de nuevo.";
    err.classList.remove("hidden");
    btn.disabled = false;
    btn.textContent = data.mode === "edit" ? "Guardar cambios" : "Registrar";
  }
};

window._deleteEvLector = async () => {
  const data = window._currentEvLector;
  if (!data?.existing?.id) return;
  if (!confirm("¿Seguro que deseas eliminar esta evidencia? Esta acción no se puede deshacer.")) return;
  try {
    await deleteEvidenciaLector(data.existing.id);
    window._closeEvLectorDialog();
  } catch (e) {
    console.error(e);
    alert("Error al eliminar.");
  }
};

function viewCursoRM(cursoId) {
  const curso = RM_CURSOS.find(c => c.id === cursoId);
  if (!curso) return "<p>Curso no encontrado.</p>";

  // Materias específicas de este curso (excluyendo Matemáticas que va siempre en sesión 1)
  const cursoMaterias = (curso.materias || []).filter(m => m !== "Matemáticas");
  // Sesión 2: materias del ámbito CT (científico-tecnológico) del curso
  const materiasSesion2 = cursoMaterias.filter(m => {
    const area = MATERIA_TO_AREA[m];
    return area === "CT";
  });
  // Sesión 3: resto de materias (SL + AR)
  const materiasSesion3 = cursoMaterias.filter(m => {
    const area = MATERIA_TO_AREA[m];
    return area === "SL" || area === "AR";
  });
  // Fallback: si no hay materias CT, usar todas; si no hay SL/AR, usar todas
  if (materiasSesion2.length === 0) materiasSesion2.push(...cursoMaterias);
  if (materiasSesion3.length === 0) materiasSesion3.push(...cursoMaterias);

  // Generate schedule
  const EVALS = getEvaluacionesForCurso(getCurrentCurso());
  const totalWeeks = EVALS.reduce((a, e) => a + e.weeks, 0);
  const schedule = [];
  for (let w = 1; w <= totalWeeks; w++) {
    const { start, end } = getWeekDates(w);
    const evalIdx = getEvaluationForWeek(w);

    // Sesión 1: siempre Matemáticas
    const sesion1Actividad = ACTIVIDADES_MATEMATICAS[(w - 1) % ACTIVIDADES_MATEMATICAS.length];
    const sesion1 = { sesion: 1, materia: "Matemáticas", actividad: sesion1Actividad, codigo: `MA.C.E.${1 + ((w - 1) % 9)}.3` };

    // Sesión 2: rotación entre materias CT del curso
    const m2 = materiasSesion2[(w - 1) % materiasSesion2.length] || materiasSesion2[0];
    const sesion2 = { sesion: 2, materia: m2, actividad: `Actividad de razonamiento matemático en ${m2}`, codigo: "RM.C.E.2" };

    // Sesión 3: rotación entre materias SL/AR del curso
    const m3 = materiasSesion3[(w - 1) % materiasSesion3.length] || materiasSesion3[0];
    // Si la materia es Lengua, usar una actividad específica del PDF de la Orden de 30 de mayo de 2023
    let actividadSesion3 = `Aplicación de matemáticas en ${m3}`;
    let codigoSesion3 = "RM.C.E.3";
    if (m3 === "Lengua") {
      const actLengua = getActividadLenguaRM(cursoId, w);
      if (actLengua) {
        actividadSesion3 = actLengua;
        codigoSesion3 = "LCL.C.E.RM";
      }
    }
    const sesion3 = { sesion: 3, materia: m3, actividad: actividadSesion3, codigo: codigoSesion3 };

    schedule.push({ num: w, start, end, evalIdx, sesiones: [sesion1, sesion2, sesion3] });
  }

  // Group by evaluation (curso-específico)
  const scheduleByEval = EVALS.map((ev, idx) => ({
    eval: ev,
    semanas: schedule.filter(s => s.evalIdx === idx),
  }));

  // All subjects (for filter)
  const allSubjects = new Set();
  schedule.forEach(s => s.sesiones.forEach(ses => allSubjects.add(ses.materia)));
  const subjectsArr = Array.from(allSubjects).sort();

  // Filter function
  function isVisible(sesion) {
    if (state.filter.type === "all") return true;
    if (state.filter.type === "subject") return sesion.materia === state.filter.value;
    if (state.filter.type === "ambito") return AMBITOS[state.filter.value]?.materias.includes(sesion.materia);
    return true;
  }

  // Counts for chart
  const counts = {};
  state.evidenciasRM.forEach(e => {
    if (e.cursoId === cursoId) counts[e.materia] = (counts[e.materia] || 0) + 1;
  });
  const totalEv = Object.values(counts).reduce((a, b) => a + b, 0);

  // Evidencia helper
  function getEv(grupo, semana, sesion) {
    return state.evidenciasRM.find(e => e.cursoId === cursoId && e.grupo === grupo && e.semana === semana && e.sesion === sesion);
  }

  return `
    <div class="space-y-4">
      <div class="overflow-hidden rounded-2xl bg-gradient-to-br ${curso.gradiente} text-white shadow-lg p-4 sm:p-6">
        <h1 class="text-lg sm:text-2xl font-bold">Plan de Razonamiento Matemático (${curso.nombre})</h1>
        <p class="text-sm text-white/85 mt-1">Cronograma interactivo · 36 semanas · 3 sesiones/semana</p>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 p-3 sm:p-4">
        <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
          <div class="flex items-center gap-2 text-sm font-semibold text-slate-700">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Filtrar
          </div>
          <button data-action="toggle-reports" class="px-3 py-1.5 rounded-md text-sm font-medium ${state.showReports ? 'bg-slate-800 text-white' : 'border border-slate-300 hover:bg-slate-50'}">
            <svg class="w-4 h-4 inline mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Informes
          </button>
        </div>
        <div class="space-y-2">
          <p class="text-xs font-semibold text-slate-600">Por asignatura:</p>
          <div class="flex flex-wrap gap-1.5">
            <button data-action="set-filter" data-filter-type="all" data-filter-value="" class="h-8 px-3 rounded-md text-xs font-medium ${state.filter.type === 'all' ? 'bg-slate-800 text-white' : 'border border-slate-300 hover:bg-slate-50'}">↺ Mostrar todo</button>
            ${subjectsArr.map(s => {
              const active = state.filter.type === "subject" && state.filter.value === s;
              const color = SUBJECT_COLORS[s] || "#64748B";
              return `<button data-action="set-filter" data-filter-type="subject" data-filter-value="${s}" class="h-8 px-3 rounded-md text-xs font-medium transition" style="${active ? `background:${color};color:white` : `border:1px solid ${color};color:${color}`}">${s}</button>`;
            }).join("")}
          </div>
        </div>
        <div class="space-y-2 mt-3">
          <p class="text-xs font-semibold text-slate-600">Por ámbito:</p>
          <div class="flex flex-wrap gap-1.5">
            ${["CT", "SL", "AR"].map(a => `
              <button data-action="set-filter" data-filter-type="ambito" data-filter-value="${a}" class="h-8 px-3 rounded-md text-xs font-medium ${state.filter.type === 'ambito' && state.filter.value === a ? 'bg-slate-800 text-white' : 'border border-slate-300 hover:bg-slate-50'}">${a} · ${AMBITOS[a].nombre}</button>
            `).join("")}
          </div>
        </div>
      </div>

      ${state.showReports ? renderReportsPanel(curso, schedule) : ""}

      ${totalEv > 0 ? renderDistributionChart(counts, totalEv) : ""}

      <div class="space-y-3">
        ${scheduleByEval.map((g, idx) => `
          <details ${state.openEvals.has(idx) ? "open" : ""} class="border rounded-xl overflow-hidden border-slate-200 bg-white shadow-sm">
            <summary class="px-4 py-3 hover:bg-slate-50 bg-gradient-to-r from-purple-50 to-indigo-50 flex items-center justify-between" data-action="toggle-eval" data-idx="${idx}">
              <div class="flex items-center gap-2 text-left">
                <svg class="w-4 h-4 text-purple-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="font-bold text-slate-800 text-sm sm:text-base">${g.eval.name}</span>
                <span class="text-xs text-slate-500 hidden sm:inline">(${g.eval.weeks} semanas)</span>
              </div>
              <svg class="w-4 h-4 text-slate-400 acc-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </summary>
            <div class="p-2 sm:p-3 space-y-2">
              ${g.semanas.map(sem => renderWeekRM(sem, curso, isVisible, getEv)).join("")}
            </div>
          </details>
        `).join("")}
      </div>
    </div>`;
}

function renderWeekRM(sem, curso, isVisible, getEv) {
  const sesionesHtml = sem.sesiones.map(s => {
    if (!isVisible(s)) {
      return `<div class="rounded border border-dashed border-slate-200 p-3 text-center text-xs text-slate-400">Sesión ${s.sesion} · Oculta por filtro</div>`;
    }
    const color = SUBJECT_COLORS[s.materia] || "#64748B";
    // Recoger actividades realizadas de los grupos que tienen registro en esta sesión
    const gruposConEv = curso.grupos.map(g => {
      const ev = getEv(g, sem.num, s.sesion);
      return ev ? { grupo: g, ev } : null;
    }).filter(Boolean);
    const tieneActividadesRealizadas = gruposConEv.length > 0;
    return `
      <div class="rounded-lg border border-slate-200 p-3 bg-white" style="border-left: 4px solid ${color}">
        <div class="flex items-start justify-between mb-1">
          <span class="text-[10px] font-bold uppercase tracking-wide text-slate-500">Sesión ${s.sesion}</span>
          <span class="text-[10px] px-1.5 py-0.5 rounded" style="background:${color}20;color:${color}">${s.materia}</span>
        </div>
        ${tieneActividadesRealizadas
          ? gruposConEv.map(({ grupo, ev }) => `

window._generateSubjectPDF = (cursoId, cursoNombre) => {
  const subject = document.getElementById("rpt-subject").value;
  if (!subject) { alert("Selecciona una materia."); return; }
  const eval1 = document.getElementById("rpt-eval1").checked;
  const eval2 = document.getElementById("rpt-eval2").checked;
  const eval3 = document.getElementById("rpt-eval3").checked;

  const evs = state.evidenciasRM.filter(e => e.cursoId === cursoId && e.materia === subject);

  // Usar evaluaciones del curso actual en vez de constantes globales
  const EVALS = getEvaluacionesForCurso(getCurrentCurso());
  const totalWeeks = EVALS.reduce((a, e) => a + e.weeks, 0);

  // Materias específicas del curso
  const curso = RM_CURSOS.find(c => c.id === cursoId);
  const cursoMaterias = (curso?.materias || []).filter(m => m !== "Matemáticas");
  const materiasSesion2 = cursoMaterias.filter(m => MATERIA_TO_AREA[m] === "CT");
  const materiasSesion3 = cursoMaterias.filter(m => MATERIA_TO_AREA[m] === "SL" || MATERIA_TO_AREA[m] === "AR");
  if (materiasSesion2.length === 0) materiasSesion2.push(...cursoMaterias);
  if (materiasSesion3.length === 0) materiasSesion3.push(...cursoMaterias);

  const schedule = [];
  for (let w = 1; w <= totalWeeks; w++) {
    const { start } = getWeekDates(w);
    const evalIdx = getEvaluationForWeek(w);
    if ((evalIdx === 0 && !eval1) || (evalIdx === 1 && !eval2) || (evalIdx === 2 && !eval3)) continue;
    const m2 = materiasSesion2[(w - 1) % materiasSesion2.length] || materiasSesion2[0];
    const m3 = materiasSesion3[(w - 1) % materiasSesion3.length] || materiasSesion3[0];
    schedule.push({ num: w, start, sesiones: [
      { sesion: 1, materia: "Matemáticas", actividad: "", codigo: "" },
      { sesion: 2, materia: m2, actividad: "", codigo: "" },
      { sesion: 3, materia: m3, actividad: "", codigo: "" },
    ] });
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.text(`Informe RM - ${cursoNombre}`, 14, 18);
  doc.setFontSize(11);
  doc.text(`Materia: ${subject}`, 14, 26);
  doc.text(`Evaluaciones: ${[eval1 && "1ª", eval2 && "2ª", eval3 && "3ª"].filter(Boolean).join(", ")}`, 14, 32);
  doc.text(`Evidencias registradas: ${evs.length}`, 14, 38);

  const rows = [];
  schedule.forEach(s => {
    const sesion = s.sesiones.find(x => x.materia === subject);
    if (!sesion) return;
    const evsIn = evs.filter(e => e.semana === s.num && e.sesion === sesion.sesion);
    if (evsIn.length === 0) {
      rows.push([`S${s.num}`, sesion.sesion, formatDateES(s.start), "—", "—", "Sin registrar"]);
    } else {
      evsIn.forEach(e => {
        rows.push([`S${s.num}`, sesion.sesion, formatDateES(s.start), e.grupo, e.profesor, e.actividadRealizada]);
      });
    }
  });

  doc.autoTable({
    head: [["Semana", "Sesión", "Inicio", "Grupo", "Profesor", "Actividad"]],
    body: rows,
    startY: 44,
    styles: { fontSize: 9, cellPadding: 2 },
    headStyles: { fillColor: [79, 70, 229] },
  });

  doc.save(`informe_RM_${cursoId}_${subject.replace(/\s+/g, "_")}.pdf`);
};

window._generateTrimestrePDF = (cursoId, cursoNombre) => {
  const tri1 = document.getElementById("rpt-tri1").checked;
  const tri2 = document.getElementById("rpt-tri2").checked;
  const tri3 = document.getElementById("rpt-tri3").checked;
  const wanted = [];
  if (tri1) for (let i = 1; i <= 14; i++) wanted.push(i);
  if (tri2) for (let i = 15; i <= 25; i++) wanted.push(i);
  if (tri3) for (let i = 26; i <= 36; i++) wanted.push(i);
  if (wanted.length === 0) { alert("Selecciona al menos un trimestre."); return; }

  const evs = state.evidenciasRM.filter(e => e.cursoId === cursoId && wanted.includes(e.semana));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.text(`Informe RM por Trimestre - ${cursoNombre}`, 14, 18);
  doc.setFontSize(11);
  doc.text(`Trimestres: ${[tri1 && "1º (S1-S14)", tri2 && "2º (S15-S25)", tri3 && "3º (S26-S36)"].filter(Boolean).join(", ")}`, 14, 26);
  doc.text(`Evidencias: ${evs.length}`, 14, 32);

  const rows = evs.sort((a, b) => a.semana - b.semana || a.sesion - b.sesion).map(e => [
    `S${e.semana}`, e.sesion, e.grupo, e.materia, e.profesor, e.actividadRealizada, e.observacion || "",
  ]);

  doc.autoTable({
    head: [["Semana", "Ses.", "Grupo", "Materia", "Profesor", "Actividad", "Obs."]],
    body: rows,
    startY: 38,
    styles: { fontSize: 8, cellPadding: 2 },
    headStyles: { fillColor: [79, 70, 229] },
  });

  doc.save(`informe_RM_${cursoId}_trimestres.pdf`);
};

function renderDistributionChart(counts, total) {
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const radius = 60;
  const circ = 2 * Math.PI * radius;
  let acc = 0;
  const segments = entries.map(([materia, count]) => {
    const fraction = count / total;
    const dash = fraction * circ;
    const offset = acc;
    acc += dash;
    return { materia, count, dash, offset };
  });

  return `
    <div class="bg-white rounded-xl border border-slate-200 p-4">
      <div class="flex items-center gap-2 mb-3">
        <svg class="w-4 h-4 text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <h3 class="text-sm font-bold text-slate-800">Distribución por materia (${total} evidencias)</h3>
      </div>
      <div class="flex flex-col sm:flex-row items-center gap-4">
        <svg width="160" height="160" viewBox="0 0 160 160" class="shrink-0">
          <circle cx="80" cy="80" r="${radius}" fill="none" stroke="#e2e8f0" stroke-width="20" />
          ${segments.map(s => `
            <circle cx="80" cy="80" r="${radius}" fill="none"
              stroke="${SUBJECT_COLORS[s.materia] || "#64748B"}" stroke-width="20"
              stroke-dasharray="${s.dash} ${circ - s.dash}"
              stroke-dashoffset="${-s.offset}"
              transform="rotate(-90 80 80)" />
          `).join("")}
          <text x="80" y="76" text-anchor="middle" fill="#1e293b" style="font-size:22px;font-weight:bold">${total}</text>
          <text x="80" y="92" text-anchor="middle" fill="#64748b" style="font-size:10px">total</text>
        </svg>
        <div class="flex-1 w-full grid grid-cols-1 sm:grid-cols-2 gap-1.5 text-xs">
          ${segments.map(s => `
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-sm shrink-0" style="background:${SUBJECT_COLORS[s.materia] || "#64748B"}"></span>
              <span class="text-slate-700 truncate flex-1">${s.materia}</span>
              <span class="font-bold text-slate-800">${s.count} (${Math.round((s.count / total) * 100)}%)</span>
            </div>
          `).join("")}
        </div>
      </div>
    </div>`;
}

window._closeEvRMDialog = () => {
  document.getElementById("ev-rm-dialog")?.remove();
  window._currentEvRM = null;
};

window._saveEvRM = async () => {
  const data = window._currentEvRM;
  if (!data) return;
  const profesor = document.getElementById("ev-rm-profesor").value.trim();
  const actividadRealizada = document.getElementById("ev-rm-actividad").value.trim();
  const observacion = document.getElementById("ev-rm-obs").value.trim();
  const err = document.getElementById("ev-rm-error");
  err.classList.add("hidden");
  if (!profesor) { err.textContent = "Indica tu nombre."; err.classList.remove("hidden"); return; }
  if (!actividadRealizada) { err.textContent = "Indica la actividad realizada."; err.classList.remove("hidden"); return; }

  const btn = document.getElementById("ev-rm-save");
  btn.disabled = true;
  btn.textContent = "Guardando…";
  try {
    if (data.mode === "edit" && data.existing?.id) {
      await updateEvidenciaRM(data.existing.id, { profesor, actividadRealizada, observacion });
    } else {
      await addEvidenciaRM({
        plan: "rm", cursoId: data.cursoId, grupo: data.grupo, semana: data.semana,
        sesion: data.sesion, materia: data.materia, actividad: data.actividad, codigo: data.codigo,
        profesor, actividadRealizada, observacion,
      });
    }
    window._closeEvRMDialog();
  } catch (e) {
    console.error(e);
    err.textContent = "Error al guardar. Inténtalo de nuevo.";
    err.classList.remove("hidden");
    btn.disabled = false;
    btn.textContent = data.mode === "edit" ? "Guardar cambios" : "Registrar";
  }
};

window._deleteEvRM = async () => {
  const data = window._currentEvRM;
  if (!data?.existing?.id) return;
  if (!confirm("¿Seguro que deseas eliminar esta evidencia?")) return;
  try {
    await deleteEvidenciaRM(data.existing.id);
    window._closeEvRMDialog();
  } catch (e) {
    console.error(e);
    alert("Error al eliminar.");
  }
};

window._savePerfil = async () => {
  const nombre = document.getElementById("perfil-nombre").value.trim();
  const departamento = document.getElementById("perfil-departamento").value;
  const err = document.getElementById("perfil-error");
  const success = document.getElementById("perfil-success");
  err.classList.add("hidden");
  success.classList.add("hidden");
  if (nombre.length < 3) { err.textContent = "Indica tu nombre completo."; err.classList.remove("hidden"); return; }
  if (!departamento) { err.textContent = "Selecciona tu departamento."; err.classList.remove("hidden"); return; }
  const btn = document.getElementById("perfil-save-btn");
  btn.disabled = true;
  btn.innerHTML = `<svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60"/></svg> Guardando…`;
  try {
    // Actualizar perfil en Firebase Auth
    if (state.user && state.user.displayName !== nombre) {
      await updateProfile(state.user, { displayName: nombre });
    }
    // Actualizar perfil en Firestore
    const updated = await updateUserProfile(state.user.uid, { displayName: nombre, department: departamento });
    state.userProfile = updated;
    success.textContent = "Perfil actualizado correctamente.";
    success.classList.remove("hidden");
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar cambios`;
    // Re-render para actualizar el nombre en la barra superior
    renderAppShell();
  } catch (e) {
    console.error(e);
    err.textContent = "Error al guardar el perfil. Inténtalo de nuevo.";
    err.classList.remove("hidden");
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar cambios`;
  }
};

window._showInformeModal = () => {
  // Eliminar modal previo
  document.getElementById("informe-modal")?.remove();

  // Recoger datos del formulario (reutilizar la lógica de _renderInformePreview)
  const period = state.informeConfig.period;
  const curso = getCurrentCurso();

  let fechaInicio, fechaFin, periodLabel;
  try {
    if (period === "diario") {
      const f = document.getElementById("rpt-fecha")?.value;
      if (!f) { alert("Selecciona un día."); return; }
      fechaInicio = f; fechaFin = f;
      periodLabel = `Día ${formatDateES(new Date(f))}`;
    } else if (period === "semanal") {
      const wnum = parseInt(document.getElementById("rpt-semana")?.value || "1", 10);
      const { start, end } = getWeekDates(wnum);
      fechaInicio = dateToISO(start); fechaFin = dateToISO(end);
      periodLabel = `Semana ${wnum} (${formatDateES(start)} → ${formatDateES(end)})`;
    } else if (period === "mensual") {
      const v = document.getElementById("rpt-mes")?.value || "";
      const [s, e] = v.split("|");
      if (!s || !e) { alert("Selecciona un mes."); return; }
      fechaInicio = s; fechaFin = e;
      const d = new Date(s);
      periodLabel = d.toLocaleDateString("es-ES", { month: "long", year: "numeric" });
    } else if (period === "anual") {
      const cursoId = document.getElementById("rpt-curso")?.value || curso.id;
      const c = state.cursos.find(x => x.id === cursoId) || curso;
      fechaInicio = c.start; fechaFin = c.end;
      periodLabel = `Curso ${c.label || c.id}`;
    }
  } catch (e) {
    alert("Error al calcular fechas: " + e.message);
    return;
  }

  const plan = document.querySelector('input[name="rpt-plan"]:checked')?.value || "lector";
  const area = document.querySelector('input[name="rpt-area"]:checked')?.value || "";

  // Filtrar evidencias
  const inRange = (iso) => iso >= fechaInicio && iso <= fechaFin;
  let evsLector = state.evidenciasLector.filter(e => e.fecha && inRange(e.fecha));
  let evsRM = state.evidenciasRM.filter(e => {
    if (!e.semana) return false;
    const { start } = getWeekDates(e.semana);
    return inRange(dateToISO(start));
  });
  if (area) {
    if (area !== LECTOR_AREA) evsLector = [];
    evsRM = evsRM.filter(e => MATERIA_TO_AREA[e.materia] === area);
  }

  // Construir HTML del modal
  let bodyHtml = `
    <div class="space-y-4">
      <div class="bg-slate-50 border border-slate-200 rounded-lg p-3">
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center">
          <div><p class="text-2xl font-bold text-blue-600">${evsLector.length}</p><p class="text-[11px] text-slate-500">Plan Lector</p></div>
          <div><p class="text-2xl font-bold text-purple-600">${evsRM.length}</p><p class="text-[11px] text-slate-500">Plan RM</p></div>
          <div><p class="text-2xl font-bold text-emerald-600">${evsLector.length + evsRM.length}</p><p class="text-[11px] text-slate-500">Total</p></div>
          <div><p class="text-[11px] text-slate-500 mb-1">Periodo</p><p class="text-xs font-semibold text-slate-700">${escapeHtml(periodLabel)}</p></div>
        </div>
        <div class="mt-2 text-[11px] text-slate-500 text-center">
          Plan: <strong>${plan === "ambos" ? "Ambos" : (plan === "lector" ? "Lector" : "RM")}</strong>
          ${area ? `· Área: <strong>${area} · ${escapeHtml(AMBITOS[area]?.nombre || "")}</strong>` : "· Todas las áreas"}
        </div>
      </div>`;

  if ((plan === "lector" || plan === "ambos") && evsLector.length > 0) {
    bodyHtml += `<div><h4 class="text-sm font-bold text-blue-700 mb-2">Plan Lector (${evsLector.length})</h4>
      <div class="overflow-x-auto max-h-60 overflow-y-auto"><table class="w-full text-xs border border-slate-200 rounded">

window._renderInformePreview = () => {
  const container = document.getElementById("rpt-preview-content");
  if (!container) return;

  const period = state.informeConfig.period;
  const curso = getCurrentCurso();

  // Recoger fechas según periodo
  let fechaInicio, fechaFin, periodLabel;
  try {
    if (period === "diario") {
      const f = document.getElementById("rpt-fecha")?.value;
      if (!f) { container.innerHTML = '<p class="text-slate-400">Selecciona un día.</p>'; return; }
      fechaInicio = f; fechaFin = f;
      periodLabel = `Día ${formatDateES(new Date(f))}`;
    } else if (period === "semanal") {
      const wnum = parseInt(document.getElementById("rpt-semana")?.value || "1");
      const { start, end } = getWeekDates(wnum);
      fechaInicio = dateToISO(start); fechaFin = dateToISO(end);
      periodLabel = `Semana ${wnum} (${formatDateES(start)} → ${formatDateES(end)})`;
    } else if (period === "mensual") {
      const v = document.getElementById("rpt-mes")?.value || "";
      const [s, e] = v.split("|");
      if (!s || !e) { container.innerHTML = '<p class="text-slate-400">Selecciona un mes.</p>'; return; }
      fechaInicio = s; fechaFin = e;
      const d = new Date(s);
      periodLabel = d.toLocaleDateString("es-ES", { month: "long", year: "numeric" });
    } else if (period === "anual") {
      const cursoId = document.getElementById("rpt-curso")?.value || curso.id;
      const c = (state.cursos).find(x => x.id === cursoId) || curso;
      fechaInicio = c.start; fechaFin = c.end;
      periodLabel = `Curso ${c.label || c.id}`;
    }

    console.error("[_renderInformePreview] Error recogiendo fechas:", e);

window._renderFechasContainer = () => {
  const container = document.getElementById("rpt-fechas-container");
  if (!container) return;
  const period = state.informeConfig.period;
  const curso = getCurrentCurso();
  const today = dateToISO(new Date());

  if (period === "diario") {
    container.innerHTML = `
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Día *</label>
        <input id="rpt-fecha" type="date" value="${today}" min="${curso.start}" max="${curso.end}" class="w-full h-11 px-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none" />
      </div>
      <div class="flex items-end">
        <p class="text-xs text-slate-500">El informe incluirá todas las evidencias registradas ese día concreto.</p>
      </div>`;
  } else if (period === "semanal") {
    // Generar listado de semanas del curso
    const EVALS = getEvaluacionesForCurso(curso);
    const totalWeeks = EVALS.reduce((a, e) => a + e.weeks, 0);
    const weeks = [];
    for (let w = 1; w <= totalWeeks; w++) {
      const { start, end } = getWeekDates(w);
      weeks.push(`<option value="${w}">Semana ${w} · ${formatDateES(start)} → ${formatDateES(end)}</option>`);
    }
    container.innerHTML = `
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Semana *</label>
        <select id="rpt-semana" class="w-full h-11 px-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none bg-white">
          ${weeks.join("")}
        </select>
      </div>
      <div class="flex items-end">
        <p class="text-xs text-slate-500">Cada semana abarca de lunes a viernes del cronograma del plan.</p>
      </div>`;
  } else if (period === "mensual") {
    const months = [];
    const start = normalizeDate(curso.start);
    const end = normalizeDate(curso.end);
    const cur = new Date(start.getFullYear(), start.getMonth(), 1);
    while (cur <= end) {
      const y = cur.getFullYear();
      const m = cur.getMonth();
      const monthName = cur.toLocaleDateString("es-ES", { month: "long", year: "numeric" });
      const mStart = dateToISO(new Date(y, m, 1));
      const mEnd = dateToISO(new Date(y, m + 1, 0));
      months.push(`<option value="${mStart}|${mEnd}">${monthName.charAt(0).toUpperCase() + monthName.slice(1)}</option>`);
      cur.setMonth(cur.getMonth() + 1);
    }
    container.innerHTML = `
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Mes *</label>
        <select id="rpt-mes" class="w-full h-11 px-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none bg-white">
          ${months.join("")}
        </select>
      </div>
      <div class="flex items-end">
        <p class="text-xs text-slate-500">El informe agregará todas las evidencias del mes natural seleccionado.</p>
      </div>`;
  } else if (period === "anual") {
    container.innerHTML = `
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Curso escolar *</label>
        <select id="rpt-curso" class="w-full h-11 px-3 rounded-lg border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none bg-white">
          ${(state.cursos).map(c => `<option value="${c.id}" ${c.id === curso.id ? "selected" : ""}>${c.label || c.id} · ${formatDateES(new Date(c.start))} → ${formatDateES(new Date(c.end))}</option>`).join("")}
        </select>
      </div>
      <div class="flex items-end">
        <p class="text-xs text-slate-500">El informe anual cubre desde el 1 de septiembre hasta el 31 de agosto del curso seleccionado.</p>
      </div>`;
  }
};

window._generateInforme = () => {
  const plan = document.querySelector('input[name="rpt-plan"]:checked')?.value || "lector";
  const area = document.querySelector('input[name="rpt-area"]:checked')?.value || "";
  const period = state.informeConfig.period;
  const curso = getCurrentCurso();

  // Recoger fechas según periodo
  let fechaInicio, fechaFin, periodLabel;
  if (period === "diario") {
    const f = document.getElementById("rpt-fecha").value;
    if (!f) { alert("Selecciona un día."); return; }
    fechaInicio = f; fechaFin = f;
    periodLabel = `Día ${formatDateES(new Date(f))}`;
  } else if (period === "semanal") {
    const wnum = parseInt(document.getElementById("rpt-semana").value);
    const { start, end } = getWeekDates(wnum);
    fechaInicio = dateToISO(start); fechaFin = dateToISO(end);
    periodLabel = `Semana ${wnum} (${formatDateES(start)} → ${formatDateES(end)})`;
  } else if (period === "mensual") {
    const v = document.getElementById("rpt-mes").value;
    const [s, e] = v.split("|");
    fechaInicio = s; fechaFin = e;
    const d = new Date(s);
    periodLabel = d.toLocaleDateString("es-ES", { month: "long", year: "numeric" });
  } else if (period === "anual") {
    const cursoId = document.getElementById("rpt-curso").value;
    const c = (state.cursos).find(x => x.id === cursoId) || curso;
    fechaInicio = c.start; fechaFin = c.end;
    periodLabel = `Curso ${c.label || c.id}`;
  }

  // Filtrar evidencias por fecha
  const inRange = (iso) => iso >= fechaInicio && iso <= fechaFin;
  let evsLector = state.evidenciasLector.filter(e => e.fecha && inRange(e.fecha));
  let evsRM = state.evidenciasRM.filter(e => {
    // Para RM usamos la fecha de la semana (lunes)
    if (!e.semana) return false;
    const { start } = getWeekDates(e.semana);
    return inRange(dateToISO(start));
  });

  // Filtrar por área
  if (area) {
    // Lector pertenece al área SL: solo se incluye si el filtro es SL
    if (area !== LECTOR_AREA) evsLector = [];
    evsRM = evsRM.filter(e => MATERIA_TO_AREA[e.materia] === area);
  }

  // Generar PDF
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const adminName = state.userProfile?.displayName || state.user?.email || "Administrador";
  const now = new Date();
  const generatedLabel = now.toLocaleString("es-ES");

  // Cabecera
  doc.setFontSize(18); doc.setTextColor(30, 41, 59);
  doc.text("Informe de uso — Planes IES", 14, 18);
  doc.setFontSize(11); doc.setTextColor(100, 116, 139);
  doc.text(INSTITUTO.nombre, 14, 25);
  doc.text(`Generado por: ${adminName}`, 14, 31);
  doc.text(`Fecha de generación: ${generatedLabel}`, 14, 37);

  // Línea separadora
  doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.5);
  doc.line(14, 41, 196, 41);

  // Resumen
  doc.setFontSize(13); doc.setTextColor(30, 41, 59);
  doc.text(`Periodo: ${periodLabel}`, 14, 49);
  doc.setFontSize(10); doc.setTextColor(100, 116, 139);
  const areaLabel = area ? `${area} · ${AMBITOS[area].nombre}` : "Todas las áreas";
  doc.text(`Área de competencia: ${areaLabel}`, 14, 55);

  let yPos = 65;

  // Sección Plan Lector
  if (plan === "lector" || plan === "ambos") {
    doc.setFontSize(13); doc.setTextColor(37, 99, 235);
    doc.text("Plan Lector", 14, yPos);
    yPos += 6;
    doc.setFontSize(10); doc.setTextColor(30, 41, 59);
    doc.text(`Total evidencias: ${evsLector.length}`, 14, yPos);
    yPos += 5;

    if (evsLector.length > 0) {
      const rows = evsLector.map(e => [
        e.fecha || "—",
        e.grupo || "—",
        e.hora ? `${e.hora}ª` : "—",
        e.profesor || "—",
        e.tipologia || "—",
        e.tipoTexto || "—",
        (e.observacion || "").slice(0, 50),
      ]);
      doc.autoTable({
        head: [["Fecha", "Grupo", "Hora", "Profesor", "Tipología", "Tipo texto", "Obs."]],
        body: rows,
        startY: yPos,
        styles: { fontSize: 8, cellPadding: 1.5 },
        headStyles: { fillColor: [37, 99, 235] },
        columnStyles: { 6: { cellWidth: 50 } },
      });
      yPos = doc.lastAutoTable.finalY + 8;
    } else {
      doc.setTextColor(148, 163, 184);
      doc.text("No hay evidencias del Plan Lector en este periodo.", 14, yPos);
      yPos += 8;
    }
  }

  // Sección Plan RM
  if (plan === "rm" || plan === "ambos") {
    if (plan === "ambos") { doc.addPage(); yPos = 20; }
    doc.setFontSize(13); doc.setTextColor(124, 58, 237);
    doc.text("Plan de Razonamiento Matemático", 14, yPos);
    yPos += 6;
    doc.setFontSize(10); doc.setTextColor(30, 41, 59);
    doc.text(`Total evidencias: ${evsRM.length}`, 14, yPos);
    yPos += 5;

    if (evsRM.length > 0) {
      const rows = evsRM.map(e => {
        const { start } = getWeekDates(e.semana);
        return [
          `S${e.semana}`,
          dateToISO(start),
          e.grupo || "—",
          e.materia || "—",
          e.sesion ? `${e.sesion}` : "—",
          e.profesor || "—",
          (e.actividadRealizada || "").slice(0, 60),
        ];
      });
      doc.autoTable({
        head: [["Sem.", "Fecha", "Grupo", "Materia", "Ses.", "Profesor", "Actividad"]],
        body: rows,
        startY: yPos,
        styles: { fontSize: 8, cellPadding: 1.5 },
        headStyles: { fillColor: [124, 58, 237] },
        columnStyles: { 6: { cellWidth: 60 } },
      });
      yPos = doc.lastAutoTable.finalY + 8;
    } else {
      doc.setTextColor(148, 163, 184);
      doc.text("No hay evidencias del Plan RM en este periodo.", 14, yPos);
      yPos += 8;
    }
  }

  // Pie de página
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8); doc.setTextColor(148, 163, 184);
    doc.text(`${INSTITUTO.nombre} · ${INSTITUTO.localidad} · Curso ${curso.label || curso.id}`, 14, 290);
    doc.text(`Página ${i} de ${pageCount}`, 196, 290, { align: "right" });
  }

  const planLabel = plan === "ambos" ? "ambos_planes" : (plan === "lector" ? "plan_lector" : "plan_rm");
  const areaSuffix = area ? `_${area}` : "";
  doc.save(`informe_${planLabel}_${period}${areaSuffix}.pdf`);
};
