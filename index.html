const FIRESTORE_RULES_USUARIOS = `rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    // Correos con privilegio de administrador
    function isBootstrapAdmin() {
      return request.auth.token.email in [
        'admin@iesvdv.es',
        'angelmicelti@gmail.com',
        'amilleo722@g.educaand.es'
      ];
    }
    // Usuario con rol admin en su perfil de Firestore
    function isAdminInProfile() {
      return request.auth != null
        && exists(/databases/$(database)/documents/usuarios/$(request.auth.uid))
        && get(/databases/$(database)/documents/usuarios/$(request.auth.uid)).data.role == 'admin';
    }
    function isAdmin() {
      return isBootstrapAdmin() || isAdminInProfile();
    }

    // Colección usuarios
    match /usuarios/{uid} {
      allow read: if request.auth != null && (request.auth.uid == uid || isAdmin());
      allow create: if request.auth != null && (request.auth.uid == uid || isAdmin());
      allow update: if request.auth != null && (request.auth.uid == uid || isAdmin());
      allow delete: if isAdmin();
    }

    // Evidencias Plan Lector
    match /evidencias_lector/{docId} {
      allow read, write: if request.auth != null;
    }
    // Evidencias Plan RM
    match /evidencias_rm/{docId} {
      allow read, write: if request.auth != null;
    }
    // Cursos escolares
    match /cursos/{docId} {
      allow read: if request.auth != null;
      allow write: if isAdmin();
    }
    // Asignación de profesores por curso (solo admin puede escribir)
    match /curso_profesores/{docId} {
      allow read: if request.auth != null;
      allow write: if isAdmin();
    }
  }
}`;

window._copyFirestoreRules = (btnElement) => {
  const code = document.getElementById("firestore-rules-code")?.textContent || FIRESTORE_RULES_USUARIOS;
  navigator.clipboard.writeText(code).then(() => {
    const btn = btnElement || document.querySelector('[data-action="copy-firestore-rules"]');
    if (btn) {
      const original = btn.innerHTML;
      btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ¡Copiado!`;
      setTimeout(() => { btn.innerHTML = original; }, 2000);
    } else {
      alert("Reglas copiadas al portapapeles.");
    }
  }).catch(() => {
    // Fallback
    const ta = document.createElement("textarea");
    ta.value = code;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); alert("Reglas copiadas al portapapeles."); }
    catch (e) { alert("No se pudo copiar. Copia manualmente desde el cuadro."); }
    document.body.removeChild(ta);
  });
};

    "Esta función crea un perfil en Firestore para un usuario que ya existe en Firebase Authentication pero no aparece en la lista.\n\n" +
    "Paso 1: Ve a Firebase Console → Authentication → Users\n" +
    "Paso 2: Copia el User UID del usuario (columna User UID)\n" +
    "Paso 3: Pégalo aquí abajo\n\n" +
    "User UID:"
  );
  if (!uid || !uid.trim()) return;
  const trimmedUid = uid.trim();

  const nombre = prompt("Nombre y apellidos del profesor/a:") || "";
  if (nombre.length < 3) { alert("El nombre debe tener al menos 3 caracteres."); return; }
  const email = prompt("Correo electrónico:") || "";
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert("Correo electrónico no válido."); return; }
  const departamento = prompt(
    "Departamento (elige uno):\n\n" + DEPARTAMENTOS.map((d, i) => `${i + 1}. ${d}`).join("\n") + "\n\nEscribe el número:"
  );
  let deptValue = "";
  if (departamento) {
    const idx = parseInt(departamento, 10) - 1;
    if (idx >= 0 && idx < DEPARTAMENTOS.length) deptValue = DEPARTAMENTOS[idx];
  }
  if (!deptValue) { alert("Departamento no válido."); return; }
  const rol = confirm("¿Es administrador?\n\nAceptar = Sí, administrador\nCancelar = No, profesor/a") ? "admin" : "profesor";

  try {
    const profile = {
      uid: trimmedUid,
      email,
      displayName: nombre,
      role: rol,
      department: deptValue,
      createdAt: Date.now(),
      updatedAt: Date.now(),
      createdBy: state.user?.uid || null,
    };
    const ref = doc(db, USUARIOS_COLLECTION, trimmedUid);
    await setDoc(ref, profile, { merge: true });
    alert(`Perfil creado correctamente.\n\nUID: ${trimmedUid}\nNombre: ${nombre}\nCorreo: ${email}\nDepartamento: ${deptValue}\nRol: ${rol}`);
    refreshUsuariosNow();
  } catch (e) {
    console.error("[_repairUser] Error:", e);
    alert("Error al crear el perfil: " + (e.code || e.message) + "\n\nVerifica las reglas de Firestore (panel amarillo en Usuarios).");
  }
};

  const uid = document.getElementById("edituser-uid").value;

  const departamento = document.getElementById("edituser-departamento").value;
  const rol = document.querySelector('input[name="edituser-rol"]:checked')?.value || "profesor";

  const btn = document.getElementById("edituser-save");

  try {
    await updateUserProfile(uid, { displayName: nombre, department: departamento, role: rol });
    window._closeEditUserDialog();
    // Actualizar estado local
    const idx = state.usuarios.findIndex(u => u.uid === uid);
    if (idx >= 0) {
      state.usuarios[idx] = { ...state.usuarios[idx], displayName: nombre, department: departamento, role: rol, updatedAt: Date.now() };
    }
    refreshUsuariosNow();

};

window._genTempPass = () => {
  // Genera una contraseña aleatoria de 10 caracteres alfanuméricos
  const chars = "abcdefghijkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let pass = "";
  for (let i = 0; i < 10; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
  document.getElementById("adduser-pass").value = pass;
};

window._saveNewUsuario = async () => {
  const nombre = document.getElementById("adduser-nombre").value.trim();
  const email = document.getElementById("adduser-email").value.trim();
  const departamento = document.getElementById("adduser-departamento").value;
  const rol = document.querySelector('input[name="adduser-rol"]:checked')?.value || "profesor";
  const password = document.getElementById("adduser-pass").value;
  const err = document.getElementById("adduser-error");
  err.classList.add("hidden");

  // Validaciones
  if (nombre.length < 3) { err.textContent = "Indica el nombre completo del profesor/a."; err.classList.remove("hidden"); return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = "Indica un correo electrónico válido."; err.classList.remove("hidden"); return; }
  if (!departamento) { err.textContent = "Selecciona el departamento."; err.classList.remove("hidden"); return; }
  if (password.length < 6) { err.textContent = "La contraseña debe tener al menos 6 caracteres."; err.classList.remove("hidden"); return; }

  // Verificar si el correo ya existe en la lista local
  if (state.usuarios.some(u => (u.email || "").toLowerCase() === email.toLowerCase())) {
    err.textContent = "Ya existe un usuario con ese correo electrónico.";
    err.classList.remove("hidden");
    return;
  }

  const btn = document.getElementById("adduser-save");
  btn.disabled = true;
  btn.innerHTML = `<svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60"/></svg> Creando…`;

  try {
    await createUsuarioByAdmin({ nombre, email, departamento, rol, password });
    // Cerrar diálogo
    window._closeAddUsuarioDialog();
    // Mostrar confirmación
    setTimeout(() => {
      alert(`Usuario creado correctamente.\n\nNombre: ${nombre}\nCorreo: ${email}\nDepartamento: ${departamento}\nRol: ${rol === "admin" ? "Administrador" : "Profesor/a"}\nContraseña temporal: ${password}\n\nComunica estos datos al profesor/a por un canal seguro.`);
    }, 100);
    // Forzar refresco de la lista después de un breve delay (dar tiempo a Firestore a propagar)
    setTimeout(() => {
      refreshUsuariosNow();
    }, 500);
    // Y otro refresco a los 2 segundos por si Firestore tarda en propagar
    setTimeout(() => {
      refreshUsuariosNow();
    }, 2000);
  } catch (e) {
    console.error("[_saveNewUsuario] Error:", e);
    const map = {
      "auth/email-already-in-use": "Ya existe una cuenta con ese correo en Firebase Authentication.",
      "auth/invalid-email": "El correo electrónico no es válido.",
      "auth/weak-password": "La contraseña es demasiado débil (mínimo 6 caracteres).",
      "auth/network-request-failed": "Sin conexión. Revisa tu red.",
      "auth/operation-not-allowed": "Firebase Authentication no tiene habilitado Email/Password.",
      "permission-denied": "Se creó la cuenta pero no se pudo guardar el perfil en Firestore (revisa las reglas).",
    };
    // Si es un Error con mensaje propio (lanzado por createUsuarioByAdmin), usarlo directamente
    const errorMsg = e.code ? (map[e.code] || `Error: ${e.message}`) : (e.message || "Error desconocido");
    err.textContent = errorMsg;
    err.classList.remove("hidden");
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Crear usuario`;
  }
};

window._toggleUserRole = async (uid, currentRole) => {
  const newRole = currentRole === "admin" ? "profesor" : "admin";
  const action = newRole === "admin" ? "promover a administrador" : "degradar a profesor/a";
  if (!confirm(`¿Seguro que deseas ${action} a este usuario?`)) return;
  try {
    const updated = await updateUserProfile(uid, { role: newRole });
    // Actualizar estado local
    const idx = state.usuarios.findIndex(u => u.uid === uid);
    if (idx >= 0) state.usuarios[idx] = updated;
    renderMain();
  } catch (e) {
    console.error(e);
    const msg = e.code === "permission-denied"
      ? "No tienes permiso para cambiar el rol. Revisa las reglas de Firestore (ver instrucciones arriba)."
      : `Error al cambiar el rol: ${e.message || e.code || "desconocido"}`;
    alert(msg);
  }
};

            <p class="mt-1.5">Para eliminarla completamente, ve a <a href="https://console.firebase.google.com/project/iesvdv-96a18/authentication/users" target="_blank" rel="noopener" class="underline font-medium">Firebase Console → Authentication → Users</a> y bórrala manualmente.</p>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Escribe <strong>ELIMINAR</strong> para confirmar *</label>

        </div>
        <div id="deluser-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-md px-3 py-2"></div>

        <button data-action="close-delete-user-dialog" class="px-4 py-2 rounded-lg border border-slate-300 hover:bg-slate-50 text-sm font-medium">Cancelar</button>
        <button data-action="confirm-delete-usuario" data-uid="${uid}" data-nombre="${nombre.replace(/"/g, '&quot;')}" class="ml-auto px-4 py-2 rounded-lg bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white text-sm font-semibold flex items-center gap-1.5" id="deluser-btn">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>

  document.body.appendChild(overlay);
};

window._closeDeleteUsuarioDialog = () => {
  document.getElementById("delete-user-dialog")?.remove();
};

window._confirmDeleteUsuario = async (uid, nombre) => {
  const confirmText = document.getElementById("deluser-confirm").value.trim();
  const err = document.getElementById("deluser-error");
  err.classList.add("hidden");
  if (confirmText !== "ELIMINAR") {
    err.textContent = "Debes escribir ELIMINAR (en mayúsculas) para confirmar.";
    err.classList.remove("hidden");
    return;
  }
  const btn = document.getElementById("deluser-btn");
  btn.disabled = true;
  btn.innerHTML = `<svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60"/></svg> Eliminando…`;
  try {
    const report = await deleteUsuarioCascade(uid);
    window._closeDeleteUsuarioDialog();
    let msg = `Usuario "${nombre}" eliminado.\n\n`;
    msg += `Evidencias Lector borradas: ${report.evidenciasLector}\n`;
    msg += `Evidencias RM borradas: ${report.evidenciasRM}\n`;
    msg += `Perfil eliminado: ${report.perfil ? "Sí" : "No"}\n`;
    if (report.errors.length > 0) {
      msg += `\nErrores parciales:\n${report.errors.join("\n")}\n`;
    }
    msg += `\nRecuerda: para eliminar la cuenta de acceso, ve a Firebase Console → Authentication → Users.`;
    alert(msg);
    // Forzar refresco de datos
    refreshUsuariosNow();
    refreshEvidenciasNow("all");
  } catch (e) {
    console.error(e);
    err.textContent = `Error al eliminar: ${e.message || e.code || "desconocido"}`;
    err.classList.remove("hidden");
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg> Eliminar definitivamente`;
  }
};

window._setCursoActivo = (cursoId) => {
  if (!cursoId || cursoId === "auto") {
    state.forcedCursoId = null;
    try { localStorage.removeItem("forcedCursoId"); } catch (e) {}
  } else {
    state.forcedCursoId = cursoId;
    try { localStorage.setItem("forcedCursoId", cursoId); } catch (e) {}
  }
  // Forzar re-render completo de la shell
  // Usar setTimeout(0) para asegurar que el state se actualiza antes del render
  setTimeout(() => {
    renderAppShell();
  }, 0);
};

window._importProfesores = async (destinoId, origenId) => {
  if (!confirm(`¿Importar el profesorado del curso ${origenId} al curso ${destinoId}?\n\nEsto añadirá a todos los profesores asignados en ${origenId} al curso ${destinoId}.`)) return;
  try {
    const profesoresOrigen = state.profesoresPorCurso[origenId] || [];
    if (profesoresOrigen.length === 0) {
      alert(`El curso ${origenId} no tiene profesores asignados. No hay nada que importar.`);
      return;
    }
    // Combinar con los existentes en destino (sin duplicados)
    const profesoresDestino = state.profesoresPorCurso[destinoId] || [];
    const combined = Array.from(new Set([...profesoresDestino, ...profesoresOrigen]));
    // Guardar en Firestore
    await setDoc(doc(db, "curso_profesores", destinoId), {
      cursoId: destinoId,
      profesores: combined,
      updatedAt: Date.now(),
    }, { merge: true });
    state.profesoresPorCurso[destinoId] = combined;
    alert(`Importados ${profesoresOrigen.length} profesor(es) de ${origenId} a ${destinoId}.\n\nTotal profesores en ${destinoId}: ${combined.length}`);
    renderMain();
  } catch (e) {
    console.error(e);
    alert(`Error al importar profesores: ${e.message || e.code || "desconocido"}`);
  }
};

window._createCurso = async () => {
  const yearStr = document.getElementById("curso-year").value;
  const year = parseInt(yearStr);
  const err = document.getElementById("curso-error");
  err.classList.add("hidden");
  if (!year || year < 2025 || year > 2099) {
    err.textContent = "Introduce un año válido entre 2025 y 2099.";
    err.classList.remove("hidden");
    return;
  }
  const label = `${year}-${year + 1}`;
  if (state.cursos.some(c => c.id === label)) {
    err.textContent = `El curso ${label} ya existe.`;
    err.classList.remove("hidden");
    return;
  }
  const { start, end } = getSchoolYearBounds(label);
  const planStart = computePlanStartForYear(label);
  const planEndD = normalizeDate(planStart);
  planEndD.setDate(planEndD.getDate() + 36 * 7 + 4);
  const planEnd = dateToISO(planEndD);
  const evaluaciones = generateEvaluacionesForCurso({ planStart, planEnd });

  const btn = document.getElementById("curso-create-btn");
  btn.disabled = true;
  btn.innerHTML = `<svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60"/></svg> Creando…`;
  try {
    await createCurso({ id: label, label, start, end, planStart, planEnd, evaluaciones });
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Crear curso`;
    renderMain();
  } catch (e) {
    console.error(e);
    err.textContent = "Error al crear el curso. Inténtalo de nuevo.";
    err.classList.remove("hidden");
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Crear curso`;
  }
};

window._deleteCurso = async (id) => {
  if (!confirm(`¿Seguro que deseas eliminar el curso ${id}? Esta acción no se puede deshacer.`)) return;
  try {
    await deleteCurso(id);
    renderMain();
  } catch (e) {
    console.error(e);
    alert("Error al eliminar el curso.");
  }
};

// -----------------------------------------------------------------------------
// 24. ATTACH HANDLERS (placeholder para handlers adicionales)
// -----------------------------------------------------------------------------
function attachHandlers() {
  // Inicializar el contenedor de fechas del informe si estamos en esa vista
  if (state.view.name === "informes") {
    window._renderFechasContainer();
    // Cancelar timeout previo para evitar listeners duplicados
    if (window._informesTimeout) clearTimeout(window._informesTimeout);
    window._informesTimeout = setTimeout(() => {
      window._renderInformePreview();
      // Añadir listeners para actualizar vista previa cuando cambien los inputs
      document.querySelectorAll('#rpt-fechas-container input, #rpt-fechas-container select').forEach(el => {
        el.addEventListener("change", () => window._renderInformePreview());
      });
      document.querySelectorAll('input[name="rpt-plan"], input[name="rpt-area"]').forEach(el => {
        el.addEventListener("change", () => window._renderInformePreview());
      });
    }, 100);
  }
}

// =============================================================================
// INICIALIZACIÓN
// =============================================================================
// Restaurar curso forzado desde localStorage (si el admin lo estableció)
try {
  const saved = localStorage.getItem("forcedCursoId");
  if (saved) state.forcedCursoId = saved;
} catch (e) { console.warn("No se pudo leer forcedCursoId:", e); }

// Auth state observer
onAuthStateChanged(auth, async (user) => {
  // Capturar el usuario local para evitar race conditions
  const localUser = user;
  state.user = localUser;
  if (localUser) {
    try {
      const profile = await ensureUserProfile(localUser);
      // Verificar que el usuario no haya cambiado durante el await
      if (state.user !== localUser) return;
      state.userProfile = profile;
    } catch (e) {
      if (state.user !== localUser) return;
      console.error("Error cargando perfil:", e);
      state.userProfile = {
        id: localUser.uid, uid: localUser.uid, email: localUser.email || "",
        displayName: localUser.displayName || "Profesor/a", role: "profesor", department: "",
      };
    }
  } else {
    state.userProfile = null;
  }
  state.loading = false;
  setupGlobalSync();
  render();
});

// NOTA: Las suscripciones a Firestore se configuran en setupGlobalSync() dentro del
// onAuthStateChanged anterior. Esto garantiza que se re-crean cada vez que el usuario
// inicia sesión, con los permisos correctos.

// Service Worker externo (sw.js)
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(reg => {
        if (reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" });
      })
      .catch(err => console.warn("[SW] Registro fallido:", err));
  });
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (!window._swReloaded) {
      window._swReloaded = true;
      window.location.reload();
    }
  });
}

// Render inicial
render();
</script>
